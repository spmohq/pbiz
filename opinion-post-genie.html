<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Opinion or “Hot Take” Post Genie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient-start: #020617;
      --bg-gradient-end: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.4);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --accent-primary: #22d3ee;
      --accent-hover: #67e8f9;
      --accent-success: #10b981;
      --input-bg: #1e293b;
      --code-bg: rgba(0, 0, 0, 0.3);
      --shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: fixed linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
      color: var(--text-primary);
      line-height: 1.6;
      padding: 60px 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 850px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 50px;
    }

    h1 {
      font-size: 2.8rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      background: linear-gradient(to bottom right, #fff, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }

    .subtitle {
      color: var(--accent-primary);
      font-size: 0.9rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.15em;
    }

    .input-card, .output-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 30px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      margin-bottom: 30px;
    }

    label {
      display: block;
      font-weight: 700;
      color: var(--accent-primary);
      margin-bottom: 15px;
      text-transform: uppercase;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
    }

    textarea {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 15px;
      color: white;
      font-family: inherit;
      font-size: 1rem;
      resize: vertical;
      min-height: 150px;
      outline: none;
      transition: border-color 0.3s;
    }

    textarea:focus {
      border-color: var(--accent-primary);
    }

    .prompt-label {
        font-size: 1.1rem;
        color: white;
        margin-bottom: 20px;
        font-weight: 600;
        text-transform: uppercase;
    }

    .prompt-content {
      background: var(--code-bg);
      padding: 25px;
      border-radius: 12px;
      font-family: 'Source Code Pro', monospace;
      font-size: 0.95rem;
      color: #cbd5e1;
      white-space: pre-wrap;
      border: 1px solid rgba(255,255,255,0.05);
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .copy-btn {
      background: var(--accent-primary);
      color: #020617;
      border: none;
      padding: 12px 28px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.2s;
    }

    .copy-btn:hover {
      background: var(--accent-hover);
      transform: translateY(-2px);
    }

    .copy-btn.copied {
      background: var(--accent-success);
      color: white;
    }

    .footer {
      margin-top: 60px;
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.9rem;
      border-top: 1px solid var(--card-border);
      padding-top: 30px;
    }

    @media (max-width: 600px) {
      h1 { font-size: 2.2rem; }
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>Opinion or “Hot Take” Post Genie</h1>
      <p class="subtitle">Social Engagement Multiplier</p>
    </header>

    <main>
      <!-- Input Section -->
      <div class="input-card">
        <label for="insightInput">Insert Statement, Opinion, or Advice</label>
        <textarea id="insightInput" placeholder="e.g., Most people think consistency is the key to growth, but actually, it's radical experimentation..."></textarea>
      </div>

      <!-- Output Section -->
      <div class="output-card">
        <div class="prompt-label">Generated System Prompt</div>
        <div class="prompt-content" id="promptDisplay"></div>
        <button class="copy-btn" id="copyBtn">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2"></path></svg>
          <span>Copy Full Prompt</span>
        </button>
      </div>
    </main>

    <footer class="footer">
      <p>Copyright &copy; <script>document.write(new Date().getFullYear())</script> Siva Prasad Mukherjee. All Rights Reserved.</p>
    </footer>
  </div>

  <script>
    const insightInput = document.getElementById('insightInput');
    const promptDisplay = document.getElementById('promptDisplay');
    const copyBtn = document.getElementById('copyBtn');

    const updatePrompt = () => {
      const userInput = insightInput.value.trim() || "[Insert the statement, opinion, hot take, insight, or piece of advice]";

      const template = `Using the statement, opinion, insight, or piece of advice provided below, write one high-engagement social media post using the Insider Leak Technique.

The post should:

• Expand the idea into a compelling narrative.
• Frame the information as an exclusive insider secret or leaked industry insight.
• Make the reader feel privileged to access hidden knowledge.
• Use language that builds curiosity, intrigue, and urgency.
• Maintain a natural conversational tone suitable for social media.
• Keep the content concise but engaging.

End the post with a strong call-to-action (CTA) that encourages readers to comment, react, or share before the “secret” disappears.

Hook:
${userInput}`;

      promptDisplay.innerText = template;
    };

    copyBtn.addEventListener('click', () => {
      const text = promptDisplay.innerText;
      navigator.clipboard.writeText(text).then(() => {
        const originalText = copyBtn.innerHTML;
        copyBtn.innerHTML = `<span>Copied!</span>`;
        copyBtn.classList.add('copied');
        
        setTimeout(() => {
          copyBtn.innerHTML = originalText;
          copyBtn.classList.remove('copied');
        }, 2000);
      });
    });

    insightInput.addEventListener('input', updatePrompt);

    // Initialize
    updatePrompt();
  </script>
</body>
</html>
