<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Article Angle Pattern Reframing Genie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient-start: #020617;
      --bg-gradient-end: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.4);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --accent-primary: #22d3ee;
      --accent-hover: #67e8f9;
      --accent-success: #10b981;
      --input-bg: #1e293b;
      --code-bg: rgba(0, 0, 0, 0.3);
      --shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: fixed linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
      color: var(--text-primary);
      line-height: 1.6;
      padding: 60px 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 50px;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      background: linear-gradient(to bottom right, #fff, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
      line-height: 1.2;
    }

    .subtitle {
      color: var(--accent-primary);
      font-size: 0.9rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.15em;
    }

    .input-card, .output-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 30px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      margin-bottom: 30px;
    }

    label {
      display: block;
      font-weight: 700;
      color: var(--accent-primary);
      margin-bottom: 15px;
      text-transform: uppercase;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
    }

    textarea {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 15px;
      color: white;
      font-family: inherit;
      font-size: 1rem;
      resize: vertical;
      min-height: 120px;
      outline: none;
      transition: border-color 0.3s;
    }

    textarea:focus {
      border-color: var(--accent-primary);
    }

    .prompt-label {
        font-size: 1.1rem;
        color: white;
        margin-bottom: 20px;
        font-weight: 600;
        text-transform: uppercase;
    }

    .prompt-content {
      background: var(--code-bg);
      padding: 25px;
      border-radius: 12px;
      font-family: 'Source Code Pro', monospace;
      font-size: 0.9rem;
      color: #cbd5e1;
      white-space: pre-wrap;
      border: 1px solid rgba(255,255,255,0.05);
      margin-bottom: 20px;
      line-height: 1.5;
      max-height: 600px;
      overflow-y: auto;
    }

    .prompt-content::-webkit-scrollbar { width: 8px; }
    .prompt-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

    .copy-btn {
      background: rgba(34, 211, 238, 0.1);
      color: var(--accent-primary);
      border: 1px solid var(--accent-primary);
      padding: 12px 28px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.2s;
    }

    .copy-btn:hover {
      background: var(--accent-primary);
      color: #020617;
    }

    .copy-btn.copied {
      background: var(--accent-success);
      border-color: var(--accent-success);
      color: white;
    }

    .footer {
      margin-top: 60px;
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.9rem;
      border-top: 1px solid var(--card-border);
      padding-top: 30px;
    }

    @media (max-width: 600px) {
      h1 { font-size: 2rem; }
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>Article Angle Pattern Replication & Reframing Prompt</h1>
      <p class="subtitle">Pattern-Based Content Architecture</p>
    </header>

    <main>
      <div class="input-card">
        <label for="frameworkInput">Insert Desired Framework Here</label>
        <textarea id="frameworkInput" placeholder="Enter the structure or framework names you want to use for the reframe..."></textarea>
      </div>

      <div class="output-card">
        <div class="prompt-label">Final System Prompt</div>
        <div class="prompt-content" id="promptDisplay"></div>
        <button class="copy-btn" id="copyBtn">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2"></path></svg>
          <span>Copy Replication Prompt</span>
        </button>
      </div>
    </main>

    <footer class="footer">
      <p>Copyright &copy; <script>document.write(new Date().getFullYear())</script> Siva Prasad Mukherjee. All Rights Reserved.</p>
    </footer>
  </div>

  <script>
    const frameworkInput = document.getElementById('frameworkInput');
    const promptDisplay = document.getElementById('promptDisplay');
    const copyBtn = document.getElementById('copyBtn');

    const updatePrompt = () => {
      const framework = frameworkInput.value.trim() || "[Insert desired framework here]";

      const template = `Read and understand the uploaded article.

STEP 1 — Article Analysis

Analyze the article and clearly summarize the following elements:
• Niche
• Target audience
• Core topic
• Original article title
• Tone / vibe of the writing
• Primary hook used in the introduction
• Core mechanism (the system, explanation, or cause behind the result described in the article)
• Promise (the transformation, benefit, or outcome the reader expects)
• Emotional drivers used (fear, curiosity, hope, ambition, relief, etc.)
• Curiosity triggers used
• Structural flow of the article

STEP 2 — Identify the Angle Pattern

Identify the underlying "angle pattern" used in the article.
Examples of common angle patterns include:
• Hidden mistake revelation
• Counterintuitive insight
• Secret / insider knowledge
• Myth vs reality
• Unexpected cause
• Personal discovery story
• Step-by-step discovery
• Simple system or framework explanation
• Contrarian opinion
• Pattern recognition insight
Explain which pattern the article uses and why.

STEP 3 — Generate New Article Angles

Generate 10 fresh article angles that:
• Target the same niche and audience
• Preserve the same core mechanism and promise
• Use the SAME angle pattern identified above
• Maintain similar emotional appeal and curiosity style
• Do NOT copy or closely mimic the original title or wording
For each angle provide:
Angle:
A one-sentence explanation of the article idea.
Title:
A compelling article title.
Pattern Used:
Which persuasion pattern the title follows.
Each title must follow a proven high-performing headline pattern such as:
• Hidden mistake
• Counterintuitive insight
• Secret / insider knowledge
• Myth vs reality
• Curiosity gap
• Unexpected cause
• Simple system or framework
• Contrarian observation
Avoid generic titles like: "How to", "Tips for", or "Ways to" unless absolutely necessary.

STEP 4 — Reframe Using the New Framework

Select the strongest generated angle and show how the article could be structured using the framework below.
Framework: ${framework}
Provide a brief outline showing how the article would follow this framework.`;

      promptDisplay.innerText = template;
    };

    copyBtn.addEventListener('click', () => {
      const text = promptDisplay.innerText;
      navigator.clipboard.writeText(text).then(() => {
        const originalBtnHTML = copyBtn.innerHTML;
        copyBtn.innerHTML = `<span>Copied!</span>`;
        copyBtn.classList.add('copied');
        
        setTimeout(() => {
          copyBtn.innerHTML = originalBtnHTML;
          copyBtn.classList.remove('copied');
        }, 2000);
      });
    });

    frameworkInput.addEventListener('input', updatePrompt);

    // Initialize
    updatePrompt();
  </script>
</body>
</html>
