<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Analyse An Existing Post - Content Analysis Genie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient-start: #020617;
      --bg-gradient-end: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.4);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --accent-primary: #22d3ee;
      --accent-hover: #67e8f9;
      --accent-success: #10b981;
      --input-bg: #1e293b;
      --code-bg: rgba(0, 0, 0, 0.3);
      --shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: fixed linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
      color: var(--text-primary);
      line-height: 1.6;
      padding: 60px 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 50px;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      background: linear-gradient(to bottom right, #fff, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }

    .subtitle {
      color: var(--accent-primary);
      font-size: 0.9rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.15em;
    }

    .input-card, .output-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 30px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      margin-bottom: 30px;
    }

    label {
      display: block;
      font-weight: 700;
      color: var(--accent-primary);
      margin-bottom: 15px;
      text-transform: uppercase;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
    }

    textarea {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 15px;
      color: white;
      font-family: inherit;
      font-size: 1rem;
      resize: vertical;
      min-height: 150px;
      outline: none;
      transition: border-color 0.3s;
    }

    textarea:focus {
      border-color: var(--accent-primary);
    }

    .prompt-label {
        font-size: 1.1rem;
        color: white;
        margin-bottom: 20px;
        font-weight: 600;
        text-transform: uppercase;
    }

    .prompt-content {
      background: var(--code-bg);
      padding: 25px;
      border-radius: 12px;
      font-family: 'Source Code Pro', monospace;
      font-size: 0.95rem;
      color: #cbd5e1;
      white-space: pre-wrap;
      border: 1px solid rgba(255,255,255,0.05);
      margin-bottom: 20px;
      line-height: 1.5;
      max-height: 600px;
      overflow-y: auto;
    }

    .prompt-content::-webkit-scrollbar { width: 8px; }
    .prompt-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

    .copy-btn {
      background: var(--accent-primary);
      color: #020617;
      border: none;
      padding: 12px 28px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.2s;
    }

    .copy-btn:hover {
      background: var(--accent-hover);
      transform: translateY(-2px);
    }

    .copy-btn.copied {
      background: var(--accent-success);
      color: white;
    }

    .footer {
      margin-top: 60px;
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.9rem;
      border-top: 1px solid var(--card-border);
      padding-top: 30px;
    }

    @media (max-width: 600px) {
      h1 { font-size: 2rem; }
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>Analyse An Existing Post</h1>
      <p class="subtitle">CONTENT ANALYSIS PROMPT</p>
    </header>

    <main>
      <div class="input-card">
        <label for="contentInput">Paste the content here</label>
        <textarea id="contentInput" placeholder="Paste the Facebook post or article you want to analyze..."></textarea>
      </div>

      <div class="output-card">
        <div class="prompt-label">Analysis System Prompt</div>
        <div class="prompt-content" id="promptDisplay"></div>
        <button class="copy-btn" id="copyBtn">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2"></path></svg>
          <span>Copy Full Prompt</span>
        </button>
      </div>
    </main>

    <footer class="footer">
      <p>Copyright &copy; <script>document.write(new Date().getFullYear())</script> Siva Prasad Mukherjee. All Rights Reserved.</p>
    </footer>
  </div>

  <script>
    const contentInput = document.getElementById('contentInput');
    const promptDisplay = document.getElementById('promptDisplay');
    const copyBtn = document.getElementById('copyBtn');

    const updatePrompt = () => {
      const userInput = contentInput.value.trim() || "[Paste the content here]";

      const template = `Role
You are a professional content strategist and copywriting analyst who specializes in reverse engineering successful content.

Objective
Your task is to analyze the content provided below and break down the strategic elements used by the author.

Important Rules
Analyze only what is visible in the content.
Do not invent information that is not implied by the text.
Use clear bullet points in every section.
Keep explanations concise and evidence based.

STEP 1 - CONTENT OVERVIEW
Identify and summarize the following elements:

Niche
Target audience
Core topic
Original title of the content
Tone or writing style (for example: conversational, analytical, persuasive, storytelling)
Primary hook used in the introduction

STEP 2 - PSYCHOLOGICAL DRIVERS
Identify the persuasion elements used in the content.

Core mechanism
The system, explanation, or reason behind the result described in the content.

Promise
The benefit, outcome, or transformation the reader expects.

Emotional drivers used
Examples may include fear, curiosity, hope, ambition, relief, urgency, frustration.

Curiosity triggers used
Examples may include open loops, mystery statements, unresolved questions, surprising claims.

Explain briefly how these drivers appear in the text.

STEP 3 - STRUCTURAL BREAKDOWN
Break the content into its major sections.

For each section, describe:

The purpose of the section
What information it contains
How it moves the reader forward

Common section types may include:

Hook or Introduction
Problem setup
Insight or realization
Explanation of the mechanism
Supporting proof or examples
Practical takeaway or conclusion

STEP 4 - ANGLE PATTERN ANALYSIS
Identify the core angle pattern used in the content.

Common angle patterns may include but are not limited to:

Hidden mistake revelation
Counterintuitive insight
Secret or insider knowledge
Myth versus reality
Unexpected cause
Personal discovery story
Step by step discovery
Simple system or framework explanation
Contrarian opinion
Pattern recognition insight

Explain:

Which pattern best describes the content
Why it fits that pattern
What elements of the content demonstrate it

CONTENT TO ANALYZE

${userInput}`;

      promptDisplay.innerText = template;
    };

    copyBtn.addEventListener('click', () => {
      const text = promptDisplay.innerText;
      navigator.clipboard.writeText(text).then(() => {
        const originalText = copyBtn.innerHTML;
        copyBtn.innerHTML = `<span>Copied!</span>`;
        copyBtn.classList.add('copied');
        
        setTimeout(() => {
          copyBtn.innerHTML = originalText;
          copyBtn.classList.remove('copied');
        }, 2000);
      });
    });

    contentInput.addEventListener('input', updatePrompt);

    // Initialize
    updatePrompt();
  </script>
</body>
</html>
