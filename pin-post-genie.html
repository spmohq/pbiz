<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pin Post Genie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient-start: #020617;
      --bg-gradient-end: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.4);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --accent-primary: #22d3ee;
      --accent-hover: #67e8f9;
      --accent-success: #10b981;
      --input-bg: #1e293b;
      --code-bg: rgba(0, 0, 0, 0.3);
      --shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: fixed linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
      color: var(--text-primary);
      line-height: 1.6;
      padding: 60px 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 50px;
    }

    h1 {
      font-size: 2.8rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      background: linear-gradient(to bottom right, #fff, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }

    .subtitle {
      color: var(--accent-primary);
      font-size: 0.9rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.15em;
    }

    .input-card, .output-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 30px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      margin-bottom: 30px;
    }

    label {
      display: block;
      font-weight: 700;
      color: var(--accent-primary);
      margin-bottom: 15px;
      text-transform: uppercase;
      font-size: 0.8rem;
      letter-spacing: 0.05em;
    }

    textarea {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      padding: 15px;
      color: white;
      font-family: inherit;
      font-size: 1rem;
      resize: vertical;
      min-height: 80px;
      outline: none;
      transition: all 0.3s;
    }

    textarea:focus {
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.1);
    }

    .prompt-label {
        font-size: 1.1rem;
        color: white;
        margin-bottom: 20px;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .prompt-content {
      background: var(--code-bg);
      padding: 25px;
      border-radius: 12px;
      font-family: 'Source Code Pro', monospace;
      font-size: 0.9rem;
      color: #cbd5e1;
      white-space: pre-wrap;
      border: 1px solid rgba(255,255,255,0.05);
      margin-bottom: 20px;
      line-height: 1.5;
      max-height: 500px;
      overflow-y: auto;
    }

    .copy-btn {
      background: rgba(34, 211, 238, 0.1);
      color: var(--accent-primary);
      border: 1px solid var(--accent-primary);
      padding: 12px 28px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.2s;
    }

    .copy-btn:hover {
      background: var(--accent-primary);
      color: #020617;
    }

    .copy-btn.copied {
      background: var(--accent-success);
      border-color: var(--accent-success);
      color: white;
    }

    .footer {
      margin-top: 60px;
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.9rem;
      border-top: 1px solid var(--card-border);
      padding-top: 30px;
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>Pin Post Genie</h1>
      <p class="subtitle">Social Strategy & Conversion Pipeline</p>
    </header>

    <main>
      <!-- Input Section -->
      <div class="input-card">
        <label for="linkInput">Insert download link</label>
        <textarea id="linkInput" placeholder="https://example.com/download-your-product"></textarea>
      </div>

      <!-- Prompt 1: Facebook -->
      <div class="output-card">
        <div class="prompt-label">Prompt #1: (For Facebook Group)</div>
        <div class="prompt-content" id="fbDisplay"></div>
        <button class="copy-btn" onclick="copyText('fbDisplay', this)">
          <span>Copy Facebook Prompt</span>
        </button>
      </div>

      <!-- Prompt 2: WhatsApp -->
      <div class="output-card">
        <div class="prompt-label">Prompt #2: (For WhatsApp Group)</div>
        <div class="prompt-content" id="waDisplay"></div>
        <button class="copy-btn" onclick="copyText('waDisplay', this)">
          <span>Copy WhatsApp Prompt</span>
        </button>
      </div>
    </main>

    <footer class="footer">
      <p>Copyright &copy; <script>document.write(new Date().getFullYear())</script> Siva Prasad Mukherjee. All Rights Reserved.</p>
    </footer>
  </div>

  <script>
    const linkInput = document.getElementById('linkInput');
    const fbDisplay = document.getElementById('fbDisplay');
    const waDisplay = document.getElementById('waDisplay');

    const updatePrompts = () => {
      const url = linkInput.value.trim() || "[Insert download link]";

      const fbTemplate = `ROLE
You are an expert social media strategist and conversion copywriter specializing in writing high-engagement Facebook group pinned posts.

OBJECTIVE
Analyze the uploaded product document and generate a pinned Facebook group post that clearly explains the product, the audience it helps, the benefits users will receive, and where they can download the product.

CRITICAL RULES

• Do NOT ask the user for additional information.
• Use only information found in the uploaded document.
• Do NOT invent product features, benefits, or links.
• Extract the primary download or access link from the document.
• If multiple links exist, select the main product download link.

ANALYSIS PHASE

Before writing the post, analyze the document and extract:

Target Audience
Main Problem
Product Solution
Key Benefits
Unique Value
Primary Download Link

Do not display this analysis in the output.

WRITING PHASE

Create a high-engagement Facebook group pinned post using the structure below.

OUTPUT STRUCTURE

HOOK
Write a bold attention-grabbing headline with a maximum of 8 words.

WHO THIS IS FOR
Explain clearly who the product helps and what problem they face.

THE PROMISE
Explain how the product solves the problem.

WHAT YOU WILL GET

Write 4–6 outcome-focused bullet points.

Each bullet must begin with a strong action verb.

Example format:

• Create marketing content faster
• Generate social media posts instantly
• Save hours of manual writing
• Turn ideas into ready-to-publish content

OPTIONAL AUTHORITY LINE
Include a short credibility statement only if relevant information exists in the document.

ENGAGEMENT CTA

Encourage interaction using lines such as:

Follow for more tools
Comment PROMPT to learn more
Save this post for later

DOWNLOAD SECTION

End the post with a clear download instruction.

Example format:

Download the product here
${url}

STYLE GUIDELINES

• Use short paragraphs.
• Use clear spacing between sections.
• Write in simple, friendly language.
• Keep formatting easy to scan on mobile.
• Naturally include 3–5 relevant keywords from the document.

LENGTH

The final post must be between 150 and 250 words.

FINAL OUTPUT

Generate ONLY the finished pinned Facebook group post.

Do not include explanations or analysis.

SOURCE

Use the uploaded document as the only source of information.`;

      const waTemplate = `ROLE
You are a social media strategist who specializes in creating short, high-impact WhatsApp group pinned messages that quickly explain value and encourage downloads.

OBJECTIVE
Analyze the uploaded product document and generate a short pinned message suitable for a WhatsApp group.

The message must clearly explain:

• who the product is for
• the problem it solves
• the benefits users receive
• where they can download the product

CRITICAL RULES

• Do NOT ask the user for additional information.
• Use only details from the uploaded document.
• Do NOT invent links or product information.
• Extract the primary download or access link from the document.

ANALYSIS PHASE

Before writing the message, identify:

Target Audience
Main Problem
Product Solution
Top Benefits
Primary Download Link

Do not display this analysis.

WRITING PHASE

Create a short WhatsApp-friendly pinned message using the structure below.

OUTPUT STRUCTURE

HOOK
Write a short attention-grabbing headline (maximum 6 words).

AUDIENCE + PROBLEM
Briefly describe who the product helps and the problem they face.

SOLUTION
Explain how the product helps them.

KEY BENEFITS

Write 3–4 short bullet points.

Each bullet must start with an action verb.

Example format:

• Create posts instantly
• Save hours of work
• Generate marketing content
• Use AI prompts easily

DOWNLOAD SECTION

End the message with a clear download instruction.

Example format:

Download the product here
${url}

STYLE GUIDELINES

• Keep sentences short.
• Use line breaks for easy reading.
• Avoid long paragraphs.
• Keep the message simple and direct.

LENGTH

The final pinned message must be between 80 and 120 words.

FINAL OUTPUT

Generate ONLY the finished WhatsApp pinned message.

Do not include explanations or analysis.

SOURCE

Use the uploaded document as the only source of information.`;

      fbDisplay.innerText = fbTemplate;
      waDisplay.innerText = waTemplate;
    };

    const copyText = (elementId, btn) => {
      const text = document.getElementById(elementId).innerText;
      navigator.clipboard.writeText(text).then(() => {
        const originalText = btn.innerHTML;
        btn.innerHTML = `<span>Copied!</span>`;
        btn.classList.add('copied');
        setTimeout(() => {
          btn.innerHTML = originalText;
          btn.classList.remove('copied');
        }, 2000);
      });
    };

    linkInput.addEventListener('input', updatePrompts);

    // Initialize state
    updatePrompts();
  </script>
</body>
</html>
