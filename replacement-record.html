<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Record for Replacement - Tool</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient-start: #020617;
      --bg-gradient-end: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.4);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --accent-primary: #22d3ee;
      --accent-hover: #67e8f9;
      --accent-success: #10b981;
      --input-bg: #1e293b;
      --code-bg: rgba(0, 0, 0, 0.3);
      --shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: fixed linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
      color: var(--text-primary);
      line-height: 1.6;
      padding: 60px 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 50px;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      background: linear-gradient(to bottom right, #fff, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }

    .subtitle {
      color: var(--text-secondary);
      font-size: 1rem;
    }

    .input-card, .output-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 30px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      margin-bottom: 30px;
    }

    .input-group {
        margin-bottom: 25px;
    }

    .input-group:last-child {
        margin-bottom: 0;
    }

    label {
      display: block;
      font-weight: 700;
      color: var(--accent-primary);
      margin-bottom: 10px;
      text-transform: uppercase;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
    }

    textarea {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      padding: 15px;
      color: white;
      font-family: inherit;
      font-size: 0.95rem;
      resize: vertical;
      min-height: 100px;
      outline: none;
      transition: border-color 0.3s;
    }

    textarea:focus {
      border-color: var(--accent-primary);
    }

    .prompt-content {
      background: var(--code-bg);
      padding: 20px;
      border-radius: 12px;
      font-family: 'Source Code Pro', monospace;
      font-size: 0.95rem;
      color: #cbd5e1;
      white-space: pre-wrap;
      border: 1px solid rgba(255,255,255,0.05);
      margin-bottom: 20px;
      min-height: 120px;
    }

    .copy-btn {
      background: var(--accent-primary);
      color: #020617;
      border: none;
      padding: 12px 28px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.2s;
    }

    .copy-btn:hover {
      background: var(--accent-hover);
      transform: translateY(-2px);
    }

    .copy-btn.copied {
      background: var(--accent-success);
      color: white;
    }

    .footer {
      margin-top: 60px;
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.9rem;
      border-top: 1px solid var(--card-border);
      padding-top: 30px;
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>Record for Replacement</h1>
      <p class="subtitle">Quickly generate find-and-replace records</p>
    </header>

    <main>
      <div class="input-card">
        <div class="input-group">
            <label for="originalInput">Original Sentence</label>
            <textarea id="originalInput" placeholder="Enter original text here..."></textarea>
        </div>
        
        <div class="input-group">
            <label for="rewrittenInput">Rewritten Sentence</label>
            <textarea id="rewrittenInput" placeholder="Enter rewritten text here..."></textarea>
        </div>
      </div>

      <div class="output-card">
        <label>Record Output</label>
        <div class="prompt-content" id="promptDisplay">Find: 

Replace: </div>
        <button class="copy-btn" id="copyBtn">
          <span>Copy Record</span>
        </button>
      </div>
    </main>

    <footer class="footer">
      <p>Copyright &copy; <script>document.write(new Date().getFullYear())</script> Siva Prasad Mukherjee. All Rights Reserved.</p>
    </footer>
  </div>

  <script>
    const originalInput = document.getElementById('originalInput');
    const rewrittenInput = document.getElementById('rewrittenInput');
    const promptDisplay = document.getElementById('promptDisplay');
    const copyBtn = document.getElementById('copyBtn');

    const updateRecord = () => {
      const original = originalInput.value.trim();
      const rewritten = rewrittenInput.value.trim();
      
      promptDisplay.innerText = `Find: \n${original}\n\nReplace:\n${rewritten}`;
    };

    originalInput.addEventListener('input', updateRecord);
    rewrittenInput.addEventListener('input', updateRecord);

    copyBtn.addEventListener('click', () => {
      const textToCopy = promptDisplay.innerText;
      navigator.clipboard.writeText(textToCopy).then(() => {
        const originalBtnText = copyBtn.innerHTML;
        copyBtn.innerHTML = `<span>Copied!</span>`;
        copyBtn.classList.add('copied');
        
        setTimeout(() => {
          copyBtn.innerHTML = originalBtnText;
          copyBtn.classList.remove('copied');
        }, 2000);
      });
    });
    
    // Initialize
    updateRecord();
  </script>
</body>
</html>
