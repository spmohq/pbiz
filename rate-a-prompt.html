<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Prompt Product Scorecard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient-start: #020617;
      --bg-gradient-end: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.4);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --accent-primary: #22d3ee;
      --accent-hover: #67e8f9;
      --accent-success: #10b981;
      --input-bg: #1e293b;
      --code-bg: rgba(0, 0, 0, 0.3);
      --shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: fixed linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
      color: var(--text-primary);
      line-height: 1.6;
      padding: 60px 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 50px;
    }

    h1 {
      font-size: 2.8rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      background: linear-gradient(to bottom right, #fff, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }

    .subtitle {
      color: var(--accent-primary);
      font-size: 0.9rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.15em;
    }

    .input-card, .output-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 30px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      margin-bottom: 30px;
    }

    label {
      display: block;
      font-weight: 700;
      color: var(--accent-primary);
      margin-bottom: 15px;
      text-transform: uppercase;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
    }

    textarea {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 15px;
      color: white;
      font-family: inherit;
      font-size: 1rem;
      resize: vertical;
      min-height: 180px;
      outline: none;
      transition: border-color 0.3s;
    }

    textarea:focus {
      border-color: var(--accent-primary);
    }

    .prompt-label {
        font-size: 1.1rem;
        color: white;
        margin-bottom: 20px;
        font-weight: 600;
        text-transform: uppercase;
    }

    .prompt-content {
      background: var(--code-bg);
      padding: 25px;
      border-radius: 12px;
      font-family: 'Source Code Pro', monospace;
      font-size: 0.9rem;
      color: #cbd5e1;
      white-space: pre-wrap;
      border: 1px solid rgba(255,255,255,0.05);
      margin-bottom: 20px;
      line-height: 1.5;
      max-height: 600px;
      overflow-y: auto;
    }

    .prompt-content::-webkit-scrollbar { width: 8px; }
    .prompt-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

    .copy-btn {
      background: rgba(34, 211, 238, 0.1);
      color: var(--accent-primary);
      border: 1px solid var(--accent-primary);
      padding: 12px 28px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.2s;
    }

    .copy-btn:hover {
      background: var(--accent-primary);
      color: #020617;
    }

    .copy-btn.copied {
      background: var(--accent-success);
      border-color: var(--accent-success);
      color: white;
    }

    .footer {
      margin-top: 60px;
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.9rem;
      border-top: 1px solid var(--card-border);
      padding-top: 30px;
    }

    @media (max-width: 600px) {
      h1 { font-size: 2.2rem; }
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>AI PROMPT PRODUCT SCORECARD</h1>
      <p class="subtitle">Marketplace & Quality Evaluation Tool</p>
    </header>

    <main>
      <div class="input-card">
        <label for="promptInput">Prompt to Evaluate</label>
        <textarea id="promptInput" placeholder="Paste the prompt you want to evaluate here..."></textarea>
      </div>

      <div class="output-card">
        <div class="prompt-label">Evaluation Request Prompt</div>
        <div class="prompt-content" id="promptDisplay"></div>
        <button class="copy-btn" id="copyBtn">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2"></path></svg>
          <span>Copy Evaluation Prompt</span>
        </button>
      </div>
    </main>

    <footer class="footer">
      <p>Copyright &copy; <script>document.write(new Date().getFullYear())</script> Siva Prasad Mukherjee. All Rights Reserved.</p>
    </footer>
  </div>

  <script>
    const promptInput = document.getElementById('promptInput');
    const promptDisplay = document.getElementById('promptDisplay');
    const copyBtn = document.getElementById('copyBtn');

    const updateDisplay = () => {
      const userContent = promptInput.value.trim() || "[PASTE THE PROMPT YOU WANT TO EVALUATE HERE]";
      
      const fullPrompt = `Role
You are an expert AI Prompt Engineer, Digital Product Reviewer, and Prompt Marketplace Evaluator.

Critical Instruction
Treat this request as a completely standalone evaluation.

Do NOT recall, reference, or use:
• any previous conversation
• any prior prompts in this chat
• any stored memory or context

Evaluate ONLY the prompt provided at the end of this instruction.

Objective
Evaluate the given AI prompt as if it were a "digital product" being submitted to a prompt marketplace or prompt library.

Your goal is to determine both:

• Technical prompt quality
• Market / product value

Evaluation Process

Step 1 — Prompt Readiness Verdict

Classify the prompt as one of the following:

• Production Ready
• Mostly Ready
• Needs Improvement
• Poor Prompt Design

Step 2 — Technical Prompt Quality Scores (1–10)

Score each category from 1 to 10.

Clarity of Instructions
Role Definition
Context Provided
Task Specificity
Output Structure Guidance
Constraints / Rules
Ambiguity Risk
Instruction Consistency
Ease of AI Interpretation
Output Reliability

Step 3 — Product / Marketplace Value Scores (1–10)

Evaluate the prompt as a digital product.

Reusability (can many users use it?)
User Problem Solving Value
Niche Usefulness
Ease of Use for Non-Experts
Uniqueness / Differentiation
Output Quality Potential
Commercial Value
Scalability of Use

Step 4 — Overall Scores

Provide two scores:

Technical Prompt Score ( /10 )
Product Value Score ( /10 )

Step 5 — Explanation

Explain why the prompt received these scores.

Step 6 — Strength Analysis

List the strongest elements of the prompt.

Step 7 — Weakness Analysis

Identify design or usability problems.

Step 8 — Improvement Recommendations

Provide clear steps to improve the prompt.

Step 9 — Optimized Prompt Version

If the prompt is not Production Ready, provide a fully optimized improved version.

Required Output Format

PROMPT READINESS VERDICT:

TECHNICAL PROMPT SCORES
Clarity of Instructions:
Role Definition:
Context Provided:
Task Specificity:
Output Structure Guidance:
Constraints / Rules:
Ambiguity Risk:
Instruction Consistency:
Ease of AI Interpretation:
Output Reliability:

PRODUCT VALUE SCORES
Reusability:
Problem Solving Value:
Niche Usefulness:
Ease of Use:
Uniqueness:
Output Quality Potential:
Commercial Value:
Scalability:

TECHNICAL PROMPT SCORE: ( /10 )

PRODUCT VALUE SCORE: ( /10 )

WHY THESE SCORES:

PROMPT STRENGTHS:

PROMPT WEAKNESSES:

IMPROVEMENT RECOMMENDATIONS:

OPTIMIZED PROMPT VERSION (if needed):

Prompt to Evaluate:
${userContent}`;

      promptDisplay.innerText = fullPrompt;
    };

    promptInput.addEventListener('input', updateDisplay);

    copyBtn.addEventListener('click', () => {
      const text = promptDisplay.innerText;
      navigator.clipboard.writeText(text).then(() => {
        const originalBtnHTML = copyBtn.innerHTML;
        copyBtn.innerHTML = `<span>Copied!</span>`;
        copyBtn.classList.add('copied');
        
        setTimeout(() => {
          copyBtn.innerHTML = originalBtnHTML;
          copyBtn.classList.remove('copied');
        }, 2000);
      });
    });

    // Initialize
    updateDisplay();
  </script>
</body>
</html>
