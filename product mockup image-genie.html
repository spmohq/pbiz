<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Product Mockup Image Genie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient-start: #020617;
      --bg-gradient-end: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.4);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --accent-primary: #22d3ee;
      --accent-hover: #67e8f9;
      --accent-success: #10b981;
      --input-bg: #1e293b;
      --code-bg: rgba(0, 0, 0, 0.3);
      --shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: fixed linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
      color: var(--text-primary);
      line-height: 1.6;
      padding: 60px 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 850px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 50px;
    }

    h1 {
      font-size: 2.8rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      background: linear-gradient(to bottom right, #fff, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }

    .subtitle {
      color: var(--accent-primary);
      font-size: 0.9rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.15em;
    }

    .input-card, .output-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 30px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      margin-bottom: 30px;
    }

    label {
      display: block;
      font-weight: 700;
      color: var(--accent-primary);
      margin-bottom: 15px;
      text-transform: uppercase;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
    }

    textarea {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 15px;
      color: white;
      font-family: inherit;
      font-size: 1rem;
      resize: vertical;
      min-height: 100px;
      outline: none;
      transition: border-color 0.3s;
    }

    textarea:focus {
      border-color: var(--accent-primary);
    }

    .prompt-label {
        font-size: 1rem;
        color: white;
        margin-bottom: 15px;
        font-weight: 600;
    }

    .prompt-content {
      background: var(--code-bg);
      padding: 20px;
      border-radius: 12px;
      font-family: 'Source Code Pro', monospace;
      font-size: 0.95rem;
      color: #cbd5e1;
      white-space: pre-wrap;
      border: 1px solid rgba(255,255,255,0.05);
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .copy-btn {
      background: rgba(34, 211, 238, 0.1);
      color: var(--accent-primary);
      border: 1px solid var(--accent-primary);
      padding: 12px 28px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.2s;
    }

    .copy-btn:hover {
      background: var(--accent-primary);
      color: #020617;
    }

    .copy-btn.copied {
      background: var(--accent-success);
      border-color: var(--accent-success);
      color: white;
    }

    .footer {
      margin-top: 60px;
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.9rem;
      border-top: 1px solid var(--card-border);
      padding-top: 30px;
    }

    @media (max-width: 600px) {
      h1 { font-size: 2rem; }
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>Product Mockup Image Genie</h1>
      <p class="subtitle">AI Graphic Generation Dashboard</p>
    </header>

    <main>
      <div class="input-card">
        <label for="prodInput">Product Name</label>
        <textarea id="prodInput" placeholder="Enter Product Name here..."></textarea>
      </div>

      <!-- Prompt 1 Output -->
      <div class="output-card">
        <div class="prompt-label">Prompt #1: Square Mockup</div>
        <div class="prompt-content" id="p1Display"></div>
        <button class="copy-btn" onclick="copyText('p1Display', this)">
          <span>Copy Prompt #1</span>
        </button>
      </div>

      <!-- Prompt 2 Output -->
      <div class="output-card">
        <div class="prompt-label">Prompt #2: Square Banner</div>
        <div class="prompt-content" id="p2Display"></div>
        <button class="copy-btn" onclick="copyText('p2Display', this)">
          <span>Copy Prompt #2</span>
        </button>
      </div>
    </main>

    <footer class="footer">
      <p>Copyright &copy; <script>document.write(new Date().getFullYear())</script> Siva Prasad Mukherjee. All Rights Reserved.</p>
    </footer>
  </div>

  <script>
    const prodInput = document.getElementById('prodInput');
    const p1Display = document.getElementById('p1Display');
    const p2Display = document.getElementById('p2Display');

    const updatePrompts = () => {
      const productName = prodInput.value.trim() || "[Product Name]";
      
      p1Display.innerText = `Create a 1:1 square product mockup image. The design should include either an AI robot or a screenshot of an AI interface. The product (prompt) name is: ${productName}.`;
      
      p2Display.innerText = `Create a 1:1 square product mockup image for a banner.
The banner should include an AI robot or an AI interface screenshot.
The product name (prompt) is: ${productName}.`;
    };

    const copyText = (elementId, btn) => {
      const text = document.getElementById(elementId).innerText;
      navigator.clipboard.writeText(text).then(() => {
        const originalBtnHTML = btn.innerHTML;
        btn.innerHTML = `<span>Copied!</span>`;
        btn.classList.add('copied');
        
        setTimeout(() => {
          btn.innerHTML = originalBtnHTML;
          btn.classList.remove('copied');
        }, 2000);
      });
    };

    prodInput.addEventListener('input', updatePrompts);
    
    // Initial State
    updatePrompts();
  </script>
</body>
</html>
