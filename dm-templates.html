<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>10 DM Openers That Get Clicked</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient-start: #020617;
      --bg-gradient-end: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.4);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --accent-primary: #22d3ee;
      --accent-hover: #67e8f9;
      --accent-success: #10b981;
      --input-bg: #1e293b;
      --code-bg: rgba(0, 0, 0, 0.3);
      --shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: fixed linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
      color: var(--text-primary);
      line-height: 1.6;
      padding: 60px 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 50px;
    }

    h1 {
      font-size: 2.8rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      background: linear-gradient(to bottom right, #fff, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }

    .subtitle {
      color: var(--accent-primary);
      font-size: 1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.15em;
    }

    .input-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 30px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      margin-bottom: 40px;
    }

    label {
      display: block;
      font-weight: 700;
      color: var(--accent-primary);
      margin-bottom: 15px;
      text-transform: uppercase;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
    }

    textarea {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 15px;
      color: white;
      font-family: inherit;
      font-size: 1.1rem;
      resize: vertical;
      min-height: 60px;
      outline: none;
      transition: border-color 0.3s;
    }

    textarea:focus {
      border-color: var(--accent-primary);
    }

    .prompts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
      gap: 25px;
    }

    .prompt-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      backdrop-filter: blur(8px);
    }

    .prompt-header {
      font-weight: 800;
      font-size: 0.75rem;
      color: var(--accent-primary);
      text-transform: uppercase;
      margin-bottom: 15px;
      letter-spacing: 0.1em;
    }

    .prompt-content {
      background: var(--code-bg);
      padding: 15px;
      border-radius: 10px;
      font-family: 'Source Code Pro', monospace;
      font-size: 0.95rem;
      color: #cbd5e1;
      white-space: pre-wrap;
      margin-bottom: 20px;
      flex-grow: 1;
      line-height: 1.5;
    }

    .copy-btn {
      background: rgba(34, 211, 238, 0.1);
      color: var(--accent-primary);
      border: 1px solid var(--accent-primary);
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 0.85rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
      align-self: flex-start;
    }

    .copy-btn:hover {
      background: var(--accent-primary);
      color: #020617;
    }

    .copy-btn.copied {
      background: var(--accent-success);
      border-color: var(--accent-success);
      color: white;
    }

    .footer {
      margin-top: 80px;
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.9rem;
      border-top: 1px solid var(--card-border);
      padding-top: 40px;
    }

    @media (max-width: 600px) {
      .prompts-grid { grid-template-columns: 1fr; }
      h1 { font-size: 2rem; }
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>10 DM OPENERS THAT GET CLICKED</h1>
      <p class="subtitle">For Reddit, FB, Discord, or Twitter replies.</p>
    </header>

    <main>
      <div class="input-card">
        <label for="priceInput">Enter Price ($X or Free)</label>
        <textarea id="priceInput" placeholder="e.g., $19 or Free"></textarea>
      </div>

      <div class="prompts-grid" id="promptsContainer">
        <!-- Prompt 1 -->
        <div class="prompt-card">
          <div class="prompt-header">Prompt 1</div>
          <div class="prompt-content" id="p1"></div>
          <button class="copy-btn" onclick="copyText('p1', this)">Copy DM</button>
        </div>

        <!-- Prompt 2 -->
        <div class="prompt-card">
          <div class="prompt-header">Prompt 2</div>
          <div class="prompt-content" id="p2"></div>
          <button class="copy-btn" onclick="copyText('p2', this)">Copy DM</button>
        </div>

        <!-- Prompt 3 -->
        <div class="prompt-card">
          <div class="prompt-header">Prompt 3</div>
          <div class="prompt-content" id="p3"></div>
          <button class="copy-btn" onclick="copyText('p3', this)">Copy DM</button>
        </div>

        <!-- Prompt 4 -->
        <div class="prompt-card">
          <div class="prompt-header">Prompt 4</div>
          <div class="prompt-content" id="p4"></div>
          <button class="copy-btn" onclick="copyText('p4', this)">Copy DM</button>
        </div>

        <!-- Prompt 5 -->
        <div class="prompt-card">
          <div class="prompt-header">Prompt 5</div>
          <div class="prompt-content" id="p5"></div>
          <button class="copy-btn" onclick="copyText('p5', this)">Copy DM</button>
        </div>

        <!-- Prompt 6 -->
        <div class="prompt-card">
          <div class="prompt-header">Prompt 6</div>
          <div class="prompt-content" id="p6"></div>
          <button class="copy-btn" onclick="copyText('p6', this)">Copy DM</button>
        </div>

        <!-- Prompt 7 -->
        <div class="prompt-card">
          <div class="prompt-header">Prompt 7</div>
          <div class="prompt-content" id="p7"></div>
          <button class="copy-btn" onclick="copyText('p7', this)">Copy DM</button>
        </div>

        <!-- Prompt 8 -->
        <div class="prompt-card">
          <div class="prompt-header">Prompt 8</div>
          <div class="prompt-content" id="p8"></div>
          <button class="copy-btn" onclick="copyText('p8', this)">Copy DM</button>
        </div>

        <!-- Prompt 9 -->
        <div class="prompt-card">
          <div class="prompt-header">Prompt 9</div>
          <div class="prompt-content" id="p9"></div>
          <button class="copy-btn" onclick="copyText('p9', this)">Copy DM</button>
        </div>

        <!-- Prompt 10 -->
        <div class="prompt-card">
          <div class="prompt-header">Prompt 10</div>
          <div class="prompt-content" id="p10"></div>
          <button class="copy-btn" onclick="copyText('p10', this)">Copy DM</button>
        </div>
      </div>
    </main>

    <footer class="footer">
      <p>Copyright &copy; <script>document.write(new Date().getFullYear())</script> Siva Prasad Mukherjee. All Rights Reserved.</p>
    </footer>
  </div>

  <script>
    const priceInput = document.getElementById('priceInput');
    
    const templates = [
      "Hey—read your post. I made something that might help. It’s [Price]. You want it?",
      "Random, but I have a PDF that fixes that exact thing. Not free—but cheap. Want it?",
      "Not spam. Just a [Price] doc I wrote that people keep DMing about. Lmk if you want it.",
      "Helped 3 people with the same issue. Made it into a 1-pager. Can send if you want.",
      "Genuinely made this for myself but others started buying. You down to try it?",
      "Made a [Price] thing that solved this for me. If it sucks, I’ll refund. Want to see it?",
      "It’s not fancy. Just a fix. [Price]. Link if you want it.",
      "I don’t market well. But I made a solution. Want to try it?",
      "Your problem → my PDF. [Price]. Zero fluff. Want it?",
      "Not a guru. Just made something fast that worked. People like it. Want a look?"
    ];

    const updateDMs = () => {
      const price = priceInput.value.trim() || "[Price - $X or Free]";
      
      templates.forEach((template, index) => {
        const element = document.getElementById(`p${index + 1}`);
        if (element) {
          element.innerText = template.replace("[Price]", price);
        }
      });
    };

    const copyText = (id, btn) => {
      const text = document.getElementById(id).innerText;
      navigator.clipboard.writeText(text).then(() => {
        const originalText = btn.innerHTML;
        btn.innerHTML = `<span>Copied!</span>`;
        btn.classList.add('copied');
        setTimeout(() => {
          btn.innerHTML = originalText;
          btn.classList.remove('copied');
        }, 2000);
      });
    };

    priceInput.addEventListener('input', updateDMs);
    
    // Initialize
    updateDMs();
  </script>
</body>
</html>
